<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Primer Switch</title>
	
	<!-- Forma de incluir el css desde el archivo incluido en la 
		carpeta static/css-->
	<link rel="stylesheet" href="../static/css/style.css" th:href="@{/css/style.css}" />
    
</head>
<body>

    <div class="container">
        <header>
            <h1>Ejemplo: Switch</h1>
            <p>Lista de clientes procesada con Thymeleaf</p>
        </header>

        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Primer Apellido</th>
                    <th>Segundo Apellido</th>
                    <th>Género</th>
                </tr>
            </thead>
            
            <tbody th:remove="all-but-first">
                <!-- Fila de ejemplo -->
                <tr th:each="customer : ${customerList}">
                    <td th:text="${customer.nombre}">Nombre</td>
                    <td th:text="${customer.apellido1}">Apellido 1</td>
                    <td th:text="${customer.apellido2}">Apellido 2</td>

                    <td th:switch="${customer.genero}">
                        <img th:case="'male'" src="img/male.png" alt="Male" class="icon" />
                        <img th:case="'female'" src="img/female.png" alt="Female" class="icon" />
                        <span th:case="*" class="badge-unknown">Unknown</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
