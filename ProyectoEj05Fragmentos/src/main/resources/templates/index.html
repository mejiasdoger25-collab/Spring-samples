<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalle del Producto</title>
</head>
<body>

    <div th:replace="~{fragments/general :: cabecera}"></div>

    <main>
        <h2>Detalle del Producto</h2>
        <p>Nombre: <span th:text="${producto.nombre}">Nombre</span></p>
        <p>Precio: <span th:text="${producto.precio} + ' €'">0.0</span></p>
    </main>

    <div th:replace="~{fragments/general :: pie}"></div>

</body>
</html>
